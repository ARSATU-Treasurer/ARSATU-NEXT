<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSATU NEXT - สร้างคำขอเบิกเงินแทน (Proxy)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 text-gray-800 pb-20 min-h-screen">
    
    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 shadow-sm flex items-center justify-between sticky top-0 z-50">
        <a href="dashboard.html" class="p-2 text-indigo-500 hover:text-indigo-700 hover:bg-indigo-50 rounded-full transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold text-indigo-700 flex items-center gap-2"><i data-lucide="user-plus" class="w-5 h-5"></i> สร้างรายการแทน</h1>
        <div class="w-9"></div>
    </header>

    <main class="p-5 max-w-lg mx-auto">
        <form id="proxy-form" class="space-y-5">
            
            <!-- ส่วนที่ 1: ผู้ขอเบิก (Target) -->
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5 space-y-4">
                <h2 class="font-bold text-gray-800 text-sm border-b pb-2 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-blue-500"></i> 1. ทำรายการในนามของใคร?</h2>
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex items-center gap-2 p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-blue-50">
                        <input type="radio" name="target_type" value="member" checked onchange="toggleTargetType()" class="peer">
                        <span class="text-xs font-bold text-gray-700">สมาชิกในระบบ</span>
                    </label>
                    <label class="flex items-center gap-2 p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-purple-50">
                        <input type="radio" name="target_type" value="external" onchange="toggleTargetType()" class="peer">
                        <span class="text-xs font-bold text-gray-700">บุคคล/ร้านค้าภายนอก</span>
                    </label>
                </div>
                
                <div id="member-select-group">
                    <select id="proxy-user-select" class="w-full border border-gray-200 rounded-xl p-3 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
                        <option value="" disabled selected>กำลังโหลดรายชื่อ...</option>
                    </select>
                </div>
                <div id="external-input-group" class="hidden">
                    <input type="text" id="proxy-unregistered-name" placeholder="ระบุชื่อบุคคล หรือ ชื่อร้านค้า" class="w-full border border-gray-200 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50">
                </div>
            </div>

            <!-- ส่วนที่ 2: รายละเอียดโครงการและประเภท (เหมือนรูป 1) -->
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5 space-y-4">
                <h2 class="font-bold text-gray-800 text-sm border-b pb-2 flex items-center gap-2"><i data-lucide="info" class="w-4 h-4 text-indigo-500"></i> 2. ข้อมูลรายการ</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5">เลือกโครงการ <span class="text-red-500">*</span></label>
                        <select id="proxy-camp" required class="w-full border border-gray-200 bg-gray-50 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium cursor-pointer"></select>
                    </div>
                    <div>
    <label class="block text-xs font-bold text-gray-700 mb-1.5">ฝ่าย / แผนก <span class="text-red-500">*</span></label>
    <select id="proxy-department" required class="w-full border border-gray-200 bg-gray-50 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium cursor-pointer">
                            <option value="อำนวยการ">อำนวยการ</option>
                            <option value="เลขานุการ">เลขานุการ</option>
                            <option value="เหรัญญิก">เหรัญญิก</option>
                            <option value="ทะเบียน">ทะเบียน</option>
                            <option value="โครงงาน">โครงงาน</option>
                            <option value="อุปกรณ์">อุปกรณ์</option>
                            <option value="สถานที่">สถานที่</option>
                            <option value="สวัสดิการ">สวัสดิการ</option>
                            <option value="สัมพันธ์ชาวบ้าน">สัมพันธ์ชาวบ้าน</option>
                            <option value="PR">PR (ประชาสัมพันธ์)</option>
                            <option value="สปอนเซอร์">สปอนเซอร์</option>
                            <option value="สันทนาการ">สันทนาการ</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1.5">หัวข้อ / วัตถุประสงค์ <span class="text-red-500">*</span></label>
                    <input type="text" id="proxy-purpose" required placeholder="เช่น ซื้อวัตถุดิบทำอาหารค่าย, ซื้อสีทาโรงเรียน" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                </div>
                
                <div class="pt-1">
                    <label class="block text-xs font-bold text-gray-700 mb-2">ประเภทรายการ <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="relative flex items-center justify-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors">
                            <input type="radio" name="request_type" value="advance" class="peer sr-only" required>
                            <div class="peer-checked:bg-blue-100 peer-checked:border-blue-500 absolute inset-0 rounded-xl border-2 border-transparent transition-all"></div>
                            <span class="relative z-10 text-[11px] font-bold text-gray-500 peer-checked:text-blue-700">ยืมเงินทดรองจ่าย</span>
                        </label>
                        <label class="relative flex items-center justify-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-purple-50 transition-colors">
                            <input type="radio" name="request_type" value="reimburse" class="peer sr-only">
                            <div class="peer-checked:bg-purple-100 peer-checked:border-purple-500 absolute inset-0 rounded-xl border-2 border-transparent transition-all"></div>
                            <span class="relative z-10 text-[11px] font-bold text-gray-500 peer-checked:text-purple-700">เบิกเงินคืน (มีใบเสร็จ)</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- ส่วนที่ 3: รายการสินค้า (Dynamic Items เหมือนรูป 1) -->
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5">
                <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                    <h2 class="font-bold text-gray-800 text-sm flex items-center gap-2">
                        <i data-lucide="list-checks" class="w-5 h-5 text-indigo-500"></i> รายการสินค้า
                    </h2>
                    <button type="button" id="btn-add-item" class="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-2 rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1 shadow-sm border border-indigo-100">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> เพิ่มรายการ
                    </button>
                </div>
                
                <div id="items-container" class="space-y-4">
                    <!-- รายการที่ 1 -->
                    <div class="item-row bg-gray-50 border border-gray-100 rounded-xl p-4 relative group">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[11px] font-bold text-gray-400 bg-white px-2.5 py-1 rounded-md shadow-sm border border-gray-100 item-number">รายการที่ 1</span>
                            <button type="button" class="btn-remove-item text-gray-400 hover:text-red-500 transition-colors disabled:opacity-0" disabled><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                        <div class="space-y-2">
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="align-left" class="w-4 h-4 text-gray-400"></i></div>
                                <input type="text" placeholder="ชื่อรายการ (เช่น หมูสับ, สีน้ำมัน)" required class="item-desc w-full border border-gray-200 bg-white rounded-lg py-2.5 pl-9 pr-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all">
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="col-span-1 relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span class="text-gray-400 font-medium text-[10px]">จำนวน</span></div>
                                    <input type="number" placeholder="1" value="1" min="0.01" step="0.01" required class="item-qty w-full border border-gray-200 bg-white rounded-lg py-2.5 pl-12 pr-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all text-center">
                                </div>
                                <div class="col-span-2 relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span class="text-gray-400 font-medium text-xs">รวม (฿)</span></div>
                                    <input type="number" placeholder="ราคารวม" step="0.01" min="0.01" required class="item-amount w-full border border-gray-200 bg-white rounded-lg py-2.5 pl-14 pr-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all text-right font-bold text-gray-700">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-5 pt-4 border-t-2 border-dashed border-gray-200 flex justify-between items-end">
                    <span class="text-sm font-bold text-gray-600">รวมเป็นเงินที่จ่ายจริง:</span>
                    <div class="text-right flex items-baseline gap-1">
                        <span id="total-amount" class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">0.00</span>
                        <span class="text-sm font-bold text-green-500">฿</span>
                    </div>
                </div>
            </div>

            <!-- ส่วนที่ 4: บัญชีรับเงิน -->
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5 space-y-3">
                <h2 class="font-bold text-gray-800 text-sm border-b pb-2 flex items-center gap-2"><i data-lucide="landmark" class="w-4 h-4 text-green-500"></i> 3. บัญชีผู้รับเงิน</h2>
                <input type="text" id="bank-name" placeholder="ชื่อธนาคาร (เช่น กสิกรไทย)" required class="w-full border border-gray-200 rounded-xl p-2.5 text-sm bg-gray-50 outline-none">
                <input type="text" id="bank-account" placeholder="เลขที่บัญชี" required class="w-full border border-gray-200 rounded-xl p-2.5 text-sm bg-gray-50 outline-none">
                <input type="text" id="bank-account-name" placeholder="ชื่อบัญชี" required class="w-full border border-gray-200 rounded-xl p-2.5 text-sm bg-gray-50 outline-none">
            </div>

            <!-- ส่วนที่ 5: อัปโหลดและหมายเหตุ (เหมือนรูป 2) -->
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-2">อัปโหลดสลิป / ใบเสร็จ <span class="text-red-500">*</span></label>
                    <input type="file" id="receipt-file" accept="image/*,application/pdf" multiple class="w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 outline-none transition-all border border-gray-200 rounded-xl bg-gray-50 p-1.5 cursor-pointer">
                    <p class="text-[10px] text-gray-400 mt-1 pl-1">รองรับไฟล์รูปภาพและ PDF (เลือกได้มากกว่า 1 ไฟล์)</p>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-2">หมายเหตุ (ถ้ามี)</label>
                    <textarea id="remark" rows="3" placeholder="ระบุข้อมูลเพิ่มเติม เช่น ซื้อที่ร้านไหน...&#10;(หากไฟล์ PDF มีรหัสผ่าน กรุณาระบุรหัสผ่านที่นี่)" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all"></textarea>
                </div>
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-xl transition-all">
                <i data-lucide="send" class="w-5 h-5 inline mb-0.5 mr-1"></i> ยืนยันการสร้างคำขอ
            </button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/admin-proxy.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
