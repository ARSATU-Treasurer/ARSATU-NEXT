<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSATU NEXT - สแกนเอกสาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">

    <header class="bg-white px-5 py-4 shadow-sm flex items-center gap-3 sticky top-0 z-50">
        <a href="dashboard.html" class="p-2 text-gray-400 hover:text-emerald-600 rounded-full bg-gray-50"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold text-gray-800"><i data-lucide="scan" class="inline w-5 h-5 text-emerald-600 mr-1"></i> สแกนลงทะเบียนเอกสาร</h1>
    </header>

    <main class="p-5 max-w-lg mx-auto">
        <div id="step-1-upload" class="bg-white p-8 rounded-3xl shadow-sm text-center border border-gray-100">
            <div class="w-20 h-20 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="camera" class="w-10 h-10"></i>
            </div>
            <h2 class="font-bold text-xl mb-2">ถ่ายภาพเอกสาร</h2>
            <p class="text-xs text-gray-500 mb-6">ระบบจะปรับภาพให้เป็นสแกนเนอร์อัตโนมัติ</p>
            
            <input type="file" id="camera-input" accept="image/*,application/pdf" class="hidden">
            <button onclick="document.getElementById('camera-input').click()" class="w-full bg-gray-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-gray-800 transition">
                <i data-lucide="scan-line" class="w-5 h-5"></i> เปิดกล้องสแกนเลย
            </button>
        </div>

        <div id="step-2-crop" class="hidden bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-3 text-center">ปรับกรอบเอกสาร (Crop)</h3>
            <div class="w-full h-[400px] bg-gray-100 rounded-xl overflow-hidden mb-4 relative">
                <img id="image-to-crop" src="" class="max-w-full hidden">
            </div>
            <div class="flex gap-2">
                <button onclick="cancelCrop()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl">ยกเลิก</button>
                <button onclick="applyCrop()" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2"><i data-lucide="check" class="w-4 h-4"></i> ยืนยันกรอบ</button>
            </div>
        </div>

        <div id="step-3-form" class="hidden bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mt-4 animate-[slideUp_0.2s_ease-out]">
            <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">รายละเอียดทะเบียนเอกสาร</h3>
            
            <div class="mb-4 flex justify-center">
                <div class="relative w-32 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                    <img id="scanned-preview" src="" class="w-full h-auto filter contrast-125 grayscale">
                    <div class="absolute bottom-0 w-full bg-black/50 text-white text-[9px] text-center py-1">ตัวอย่างภาพสแกน</div>
                </div>
            </div>

            <form id="scanner-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ฝ่าย (Department)</label>
                    <select id="doc-dept" required class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500 font-medium">
                        <option value="">-- เลือกฝ่าย --</option>
                        <option value="อำนวยการ">อำนวยการ</option>
                        <option value="เลขานุการ">เลขานุการ</option>
                        <option value="เหรัญญิก">เหรัญญิก</option>
                        <option value="ทะเบียน">ทะเบียน</option>
                        <option value="โครงงาน">โครงงาน</option>
                        <option value="อุปกรณ์">อุปกรณ์</option>
                        <option value="สถานที่">สถานที่</option>
                        <option value="สวัสดิการ">สวัสดิการ</option>
                        <option value="สัมพันธ์ชาวบ้าน">สัมพันธ์ชาวบ้าน</option>
                        <option value="PR">PR (ประชาสัมพันธ์)</option>
                        <option value="สปอนเซอร์">สปอนเซอร์</option>
                        <option value="สันทนาการ">สันทนาการ</option>
                        <option value="ทั่วไป">ทั่วไป (ส่วนกลาง)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ชื่อเอกสาร</label>
                    <input type="text" id="doc-title" required placeholder="เช่น ใบเสร็จค่าอุปกรณ์" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">สถานที่เก็บตัวจริง</label>
                    <select id="doc-location" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-emerald-500 font-medium text-sm">
                        <option value="ห้องค่าย_ตู้ชั้นหนึ่ง">ห้องค่าย_ตู้ชั้นหนึ่ง</option>
                        <option value="ห้องค่าย_ตู้ชั้นสอง">ห้องค่าย_ตู้ชั้นสอง</option>
                        <option value="อยู่ที่อุ้มรัก">อยู่ที่อุ้มรัก</option>
                        <option value="อยู่ที่วิน">อยู่ที่วิน</option>
                        <option value="อยู่ที่เลขาฯ">อยู่ที่เลขาฯ</option>
                        <option value="อยู่ที่ฝ่ายอื่น">อยู่ที่ฝ่ายอื่น</option>
                        <option value="หาย">หาย</option>
                        <option value="ส่งแล้ว">ส่งแล้ว</option>
                    </select>
                </div>

                <button type="submit" id="btn-save" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl mt-4 transition flex justify-center items-center gap-2 shadow-md shadow-emerald-500/20">
                    <i data-lucide="save" class="w-5 h-5"></i> บันทึกเข้าระบบทะเบียน
                </button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="../js/supabase.js"></script>
    <script src="../js/scanner.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
