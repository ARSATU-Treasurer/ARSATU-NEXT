<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSATU NEXT - คลังเอกสารส่วนตัว</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 pb-20">

    <header class="bg-white px-5 py-4 shadow-sm flex items-center gap-3 sticky top-0 z-50">
        <a href="dashboard.html" class="p-2 text-gray-400 hover:text-blue-600 rounded-full bg-gray-50"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold text-gray-800 flex items-center gap-2"><i data-lucide="folder-lock" class="text-blue-600 w-5 h-5"></i> คลังเอกสารส่วนตัว</h1>
    </header>

    <main class="p-5 max-w-lg mx-auto">
        <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">

        <div id="vault-list-view" class="space-y-4">
            <button onclick="document.getElementById('camera-input').click()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-blue-700 shadow-md">
                <i data-lucide="scan" class="w-5 h-5"></i> สแกนเก็บเอกสารใหม่
            </button>
            
            <div class="mt-6">
                <h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wider">เอกสารในคลังของคุณ</h2>
                <div id="vault-items" class="grid grid-cols-2 gap-3">
                    <div class="col-span-2 text-center py-8 text-gray-400 text-sm"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> กำลังโหลด...</div>
                </div>
            </div>
        </div>

        <div id="crop-view" class="hidden bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
            <h3 class="font-bold text-gray-800 mb-3 text-center">ปรับกรอบเอกสาร</h3>
            <div class="w-full h-[400px] bg-gray-100 rounded-xl overflow-hidden mb-4 relative">
                <img id="image-to-crop" src="" class="max-w-full hidden">
            </div>
            <div class="flex gap-2">
                <button onclick="cancelCrop()" class="flex-1 bg-gray-100 text-gray-600 font-bold py-3 rounded-xl">ยกเลิก</button>
                <button onclick="applyCrop()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl flex justify-center items-center gap-2"><i data-lucide="check" class="w-4 h-4"></i> ครอปภาพ</button>
            </div>
        </div>

        <div id="save-view" class="hidden bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mt-4 animate-[slideUp_0.2s_ease-out]">
            <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">บันทึกเข้าคลังส่วนตัว</h3>
            <div class="mb-4 flex justify-center">
                <div class="relative w-32 rounded-lg overflow-hidden border border-gray-200 shadow-sm">
                    <img id="scanned-preview" src="" class="w-full h-auto filter contrast-125 grayscale">
                </div>
            </div>
            <form id="vault-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ตั้งชื่อช่วยจำ (เพื่อให้หาง่าย)</label>
                    <input type="text" id="doc-title" required placeholder="เช่น บิลเซเว่นซื้อน้ำแข็ง, ใบเสร็จโฮมโปร" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" id="btn-save" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-2 transition flex justify-center items-center gap-2 shadow-md">
                    <i data-lucide="lock" class="w-5 h-5"></i> ล็อกเก็บเข้าคลัง
                </button>
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/vault.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
