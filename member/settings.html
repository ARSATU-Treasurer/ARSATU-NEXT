<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSATU NEXT - ตั้งค่าโปรไฟล์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 text-gray-800 pb-28 min-h-screen">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 shadow-sm flex items-center justify-between">
        <a href="dashboard.html" class="text-blue-500 hover:text-blue-700 p-1 bg-blue-50 rounded-full transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">ตั้งค่าโปรไฟล์</h1>
        <div class="w-7"></div>
    </header>

    <main class="p-5 max-w-lg mx-auto">
        <form id="settings-form" class="space-y-6">
            
            <div class="flex flex-col items-center justify-center bg-white/90 backdrop-blur-sm rounded-2xl p-6 shadow-sm border border-white">
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-blue-100 shadow-md bg-gray-100 mb-3 relative" id="profile-pic-container">
                    <div class="w-full h-full flex items-center justify-center text-gray-400">
                        <i data-lucide="user" class="w-10 h-10"></i>
                    </div>
                </div>
                <p class="text-xs text-gray-500 bg-gray-100 px-3 py-1 rounded-full"><i data-lucide="info" class="w-3 h-3 inline"></i> รูปโปรไฟล์ดึงจาก LINE อัตโนมัติ</p>
            </div>

            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-6 space-y-4">
                <h2 class="font-bold text-gray-800 border-b border-gray-100 pb-2 flex items-center gap-2">
                    <span class="bg-blue-100 text-blue-600 p-1.5 rounded-lg"><i data-lucide="user-check" class="w-4 h-4"></i></span> ข้อมูลส่วนตัว
                </h2>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อเล่น <span class="text-red-500">*</span></label>
                    <input type="text" id="full-name" required placeholder="เช่น สมชาย" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">ฝ่าย (Department) <span class="text-red-500">*</span></label>
                    <select id="department" required class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                        <option value="" disabled selected>-- เลือกฝ่ายของคุณ --</option>
                        <option value="อำนวยการ">อำนวยการ (ประธาน/รองประธาน)</option>
                        <option value="เลขานุการ">เลขานุการ</option>
                        <option value="เหรัญญิก">เหรัญญิก</option>
                        <option value="ทะเบียน">ทะเบียน</option>
                        <option value="โครงงาน">โครงงาน</option>
                        <option value="อุปกรณ์">อุปกรณ์</option>
                        <option value="สถานที่">สถานที่</option>
                        <option value="สวัสดิการ">สวัสดิการ</option>
                        <option value="สัมพันธ์ชาวบ้าน">สัมพันธ์ชาวบ้าน</option>
                        <option value="PR">PR (ประชาสัมพันธ์)</option>
                        <option value="สปอนเซอร์">สปอนเซอร์</option>
                        <option value="สันทนาการ">สันทนาการ</option>
                    </select>
                </div>
            </div>

            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-6 space-y-4">
                <h2 class="font-bold text-gray-800 border-b border-gray-100 pb-2 flex items-center gap-2">
                    <span class="bg-orange-100 text-orange-600 p-1.5 rounded-lg"><i data-lucide="credit-card" class="w-4 h-4"></i></span> บัญชีธนาคารตั้งต้น (รับเงิน)
                </h2>
                <div>
                    <input type="text" id="bank-name" placeholder="ธนาคาร (เช่น กสิกรไทย)" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all mb-3">
                    <input type="text" id="bank-account" placeholder="เลขบัญชี (ไม่ต้องมีขีด)" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all mb-3">
                    <input type="text" id="bank-account-name" placeholder="ชื่อบัญชี" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
                </div>
            </div>

            <button type="submit" id="btn-save" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg hover:shadow-xl transition-all flex justify-center items-center gap-2">
                <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
            </button>
        </form>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-50">
        <ul class="flex justify-around items-center h-16 max-w-lg mx-auto">
            <li><a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors"><i data-lucide="home" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-medium">หน้าแรก</span></a></li>
            <li>
                <div class="relative -top-5">
                    <button onclick="toggleActionMenu()" class="flex items-center justify-center w-14 h-14 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full text-white shadow-lg shadow-blue-500/30 hover:scale-105 transition-transform">
                        <i data-lucide="plus" class="w-7 h-7"></i>
                    </button>
                </div>
            </li>
            <li><a href="settings.html" class="flex flex-col items-center text-blue-600 hover:text-blue-600 transition-colors w-full"><i data-lucide="user" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-medium">โปรไฟล์</span></a></li>
        </ul>
    </nav>

    <div id="action-menu-overlay" class="hidden fixed inset-0 bg-black/20 backdrop-blur-[2px] z-[60] flex items-end justify-center">
        <div id="action-menu-sheet" class="bg-white w-full max-w-lg rounded-t-3xl p-6 pt-4 space-y-4 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-4"></div>
            <h3 class="font-bold text-center text-gray-800 mb-2">เลือกรายการที่ต้องการ</h3>
            
            <a href="clearances.html" class="flex items-center gap-4 p-4 bg-blue-50 rounded-2xl hover:bg-blue-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center"><i data-lucide="file-plus" class="w-5 h-5"></i></div>
                <span class="font-bold text-blue-900">ส่งคำขอเบิกเงิน</span>
            </a>
            <a href="history.html" class="flex items-center gap-4 p-4 bg-purple-50 rounded-2xl hover:bg-purple-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-purple-500 text-white flex items-center justify-center"><i data-lucide="clock" class="w-5 h-5"></i></div>
                <span class="font-bold text-purple-900">ดูประวัติคำขอเบิกเงิน</span>
            </a>
            <a href="donations.html" class="flex items-center gap-4 p-4 bg-pink-50 rounded-2xl hover:bg-pink-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-pink-500 text-white flex items-center justify-center"><i data-lucide="heart" class="w-5 h-5"></i></div>
                <span class="font-bold text-pink-900">จัดการ / แจ้งยอดเงินบริจาค</span>
            </a>
            
            <a href="../admin/dashboard.html" id="admin-action-link" class="hidden flex items-center gap-4 p-4 bg-emerald-50 rounded-2xl hover:bg-emerald-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                <span class="font-bold text-emerald-900">ระบบจัดการหลังบ้าน (Admin)</span>
            </a>

            <button onclick="toggleActionMenu()" class="w-full text-gray-400 py-3 font-bold text-sm">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/settings.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
