<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSATU NEXT - สร้างคำขอเบิกเงิน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 text-gray-800 pb-20 min-h-screen">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 shadow-sm flex items-center justify-between">
        <a href="dashboard.html" class="text-blue-500 hover:text-blue-700 p-1 bg-blue-50 rounded-full transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">แบบฟอร์มเบิกจ่าย</h1>
        <div class="w-7"></div>
    </header>

    <main class="p-5 max-w-lg mx-auto">
        <div class="mb-3 text-right">
            <a href="#" class="text-[11px] font-bold text-blue-500 hover:text-blue-700 flex justify-end items-center gap-1 bg-blue-50 inline-flex px-3 py-1.5 rounded-full border border-blue-100 shadow-sm transition-colors">
                <i data-lucide="help-circle" class="w-3.5 h-3.5"></i> สงสัยขั้นตอนการเบิกเงิน?
            </a>
        </div>

        <form id="clearance-form" class="space-y-5">
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5">เลือกโครงการ <span class="text-red-500">*</span></label>
                        <select id="camp-select" required class="w-full border border-gray-200 bg-gray-50 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium cursor-pointer">
                            <option value="" disabled selected>โหลดข้อมูล...</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5">ฝ่าย / แผนก <span class="text-red-500">*</span></label>
                        <select id="department-select" required class="w-full border border-gray-200 bg-gray-50 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm font-medium cursor-pointer">
                            <option value="อำนวยการ">อำนวยการ</option>
                            <option value="เลขานุการ">เลขานุการ</option>
                            <option value="เหรัญญิก">เหรัญญิก</option>
                            <option value="อุปกรณ์">อุปกรณ์</option>
                            <option value="สวัสดิการ">สวัสดิการ</option>
                            <option value="ทั่วไป">ทั่วไป (ส่วนกลาง)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1.5">หัวข้อ / วัตถุประสงค์ <span class="text-red-500">*</span></label>
                    <input type="text" id="purpose" required placeholder="เช่น ซื้อวัตถุดิบทำอาหารค่าย" class="w-full border border-gray-200 bg-gray-50 rounded-xl p-2.5 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm">
                </div>
                
                <div class="pt-1">
                    <label class="block text-xs font-bold text-gray-700 mb-2">ประเภทรายการ <span class="text-red-500">*</span></label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="relative flex items-center justify-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-blue-50 transition-colors">
                            <input type="radio" name="request_type" value="advance" class="peer sr-only" required>
                            <div class="peer-checked:bg-blue-100 peer-checked:border-blue-500 peer-checked:text-blue-700 absolute inset-0 rounded-xl border-2 border-transparent transition-all"></div>
                            <span class="relative z-10 text-[11px] font-bold text-gray-500 peer-checked:text-blue-700">ยืมเงินทดรองจ่าย</span>
                        </label>
                        <label class="relative flex items-center justify-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-purple-50 transition-colors">
                            <input type="radio" name="request_type" value="reimburse" class="peer sr-only">
                            <div class="peer-checked:bg-purple-100 peer-checked:border-purple-500 peer-checked:text-purple-700 absolute inset-0 rounded-xl border-2 border-transparent transition-all"></div>
                            <span class="relative z-10 text-[11px] font-bold text-gray-500 peer-checked:text-purple-700">เบิกเงินคืน (มีใบเสร็จ)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5">
                <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                    <h2 class="font-bold text-gray-800 text-sm flex items-center gap-2"><i data-lucide="list-checks" class="w-5 h-5 text-indigo-500"></i> รายการสินค้า</h2>
                    <button type="button" id="btn-add-item" class="text-xs bg-indigo-50 text-indigo-600 font-bold px-3 py-2 rounded-lg hover:bg-indigo-100 transition-colors flex items-center gap-1 shadow-sm border border-indigo-100"><i data-lucide="plus" class="w-3.5 h-3.5"></i> เพิ่มรายการ</button>
                </div>
                
                <div id="items-container" class="space-y-4">
                    <div class="item-row bg-gray-50 border border-gray-100 rounded-xl p-4 relative group slide-down">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[11px] font-bold text-gray-400 bg-white px-2.5 py-1 rounded-md shadow-sm border border-gray-100 item-number">รายการที่ 1</span>
                            <button type="button" class="btn-remove-item text-gray-400 hover:text-red-500 transition-colors disabled:opacity-0" disabled><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                        <div class="space-y-2">
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="align-left" class="w-4 h-4 text-gray-400"></i></div>
                                <input type="text" placeholder="ชื่อรายการ (เช่น หมูสับ)" required class="item-desc w-full border border-gray-200 bg-white rounded-lg py-2.5 pl-9 pr-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all">
                            </div>
                            <div class="grid grid-cols-3 gap-2">
                                <div class="col-span-1 relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span class="text-gray-400 font-medium text-[10px]">จำนวน</span></div>
                                    <input type="number" placeholder="1" value="1" min="0.01" step="0.01" required class="item-qty w-full border border-gray-200 bg-white rounded-lg py-2.5 pl-10 pr-2 text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm text-center">
                                </div>
                                <div class="col-span-2 relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><span class="text-gray-400 font-medium text-xs">รวม (฿)</span></div>
                                    <input type="number" placeholder="ราคารวม" step="0.01" min="0.01" required class="item-amount w-full border border-gray-200 bg-white rounded-lg py-2.5 pl-12 pr-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 shadow-sm text-right font-bold text-blue-700">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-5 pt-4 border-t-2 border-dashed border-gray-200 flex justify-between items-end">
                    <span class="text-sm font-bold text-gray-600">รวมเป็นเงินที่จ่ายจริง:</span>
                    <div class="text-right flex items-baseline gap-1">
                        <span id="total-amount" class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">0.00</span>
                        <span class="text-sm font-bold text-green-500">฿</span>
                    </div>
                </div>
            </div>

            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5 space-y-4">
                <h2 class="font-bold text-gray-800 text-sm flex items-center gap-2 border-b border-gray-100 pb-3"><i data-lucide="landmark" class="w-5 h-5 text-green-500"></i> บัญชีรับเงิน</h2>
                <div class="space-y-3">
                    <label class="flex items-start gap-3 p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors" id="label-default-bank">
                        <input type="radio" name="bank_option" value="default" class="mt-1" checked>
                        <div class="text-sm">
                            <p class="font-bold text-gray-800">บัญชีที่ตั้งค่าไว้ (ค่าเริ่มต้น)</p>
                            <div id="default-bank-details" class="text-gray-500 mt-1 text-[11px]">กำลังโหลด...</div>
                        </div>
                    </label>
                    <label class="flex items-start gap-3 p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="radio" name="bank_option" value="custom" class="mt-1">
                        <div class="text-sm w-full">
                            <p class="font-bold text-gray-800 mb-2">บัญชีอื่นๆ (กรอกใหม่)</p>
                            <div id="custom-bank-inputs" class="hidden space-y-2 mt-2">
                                <input type="text" id="custom-bank-name" placeholder="ธนาคาร (เช่น กสิกรไทย)" class="w-full border border-gray-200 bg-white rounded-lg p-2.5 text-xs">
                                <input type="text" id="custom-bank-account" placeholder="เลขบัญชี" class="w-full border border-gray-200 bg-white rounded-lg p-2.5 text-xs">
                                <input type="text" id="custom-bank-account-name" placeholder="ชื่อบัญชี" class="w-full border border-gray-200 bg-white rounded-lg p-2.5 text-xs">
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-sm border border-white p-5 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-2">อัปโหลด / แนบใบเสร็จ <span class="text-red-500">*</span></label>
                    
                    <div class="flex gap-2 mb-2">
                        <input type="file" id="receipt-file" accept="image/*,application/pdf" multiple class="flex-grow w-[60%] text-sm text-gray-500 file:mr-2 file:py-2 file:px-3 file:rounded-xl file:border-0 file:text-[10px] file:font-semibold file:bg-blue-50 file:text-blue-700 border border-gray-200 rounded-xl bg-gray-50 p-1 cursor-pointer">
                        <button type="button" onclick="openVaultModal()" class="shrink-0 w-[40%] bg-blue-100 text-blue-700 font-bold px-2 py-2 rounded-xl text-[10px] hover:bg-blue-200 transition flex items-center justify-center gap-1 border border-blue-200 shadow-sm">
                            <i data-lucide="folder-lock" class="w-3.5 h-3.5"></i> เลือกจากคลัง
                        </button>
                    </div>
                    
                    <p class="text-[9px] text-gray-400 pl-1">เลือกไฟล์จากเครื่อง หรือดึงรูปที่สแกนเก็บไว้แล้วจากคลังส่วนตัว</p>

                    <div id="vault-preview-container" class="mt-3 flex flex-wrap gap-2 hidden border-t border-gray-100 pt-3"></div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-2">หมายเหตุ (ถ้ามี)</label>
                    <textarea id="remark" rows="2" placeholder="เช่น รหัสผ่านไฟล์ PDF..." class="w-full border border-gray-200 bg-gray-50 rounded-xl p-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
            </div>

            <div class="flex gap-3 mb-8">
                <button type="button" onclick="submitClearance('draft')" class="w-1/3 bg-white text-gray-700 border border-gray-300 font-bold py-3.5 rounded-xl shadow-sm hover:bg-gray-50 transition-all text-sm">
                    <i data-lucide="save" class="w-4 h-4 inline mb-0.5"></i> ร่าง
                </button>
                <button type="button" onclick="submitClearance('pending')" id="btn-submit" class="w-2/3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all text-sm">
                    <i data-lucide="send" class="w-4 h-4 inline mb-0.5"></i> ส่งคำขอ
                </button>
            </div>
        </form>
    </main>

    <div id="vault-modal" class="hidden fixed inset-0 bg-gray-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-[slideUp_0.2s_ease-out]">
            <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-blue-50">
                <h3 class="font-bold text-blue-900 text-sm flex items-center gap-2"><i data-lucide="folder-lock" class="w-5 h-5 text-blue-600"></i> เลือกเอกสารจากคลัง</h3>
                <button type="button" onclick="closeVaultModal()" class="text-blue-400 hover:text-blue-600 bg-white p-1 rounded-lg shadow-sm"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-grow bg-gray-50" id="vault-modal-content">
                <div class="text-center py-8 text-gray-400"><i data-lucide="loader-2" class="w-6 h-6 animate-spin mx-auto mb-2"></i> กำลังโหลดคลัง...</div>
            </div>
            
            <div class="px-5 py-4 border-t border-gray-100 bg-white flex gap-3">
                <button type="button" onclick="closeVaultModal()" class="flex-1 bg-white border border-gray-200 text-gray-600 font-bold py-3.5 rounded-xl text-sm hover:bg-gray-50 transition-colors">ยกเลิก</button>
                <button type="button" onclick="confirmVaultSelection()" class="flex-1 bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-blue-700 transition-colors text-sm">แนบเอกสารที่เลือก</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-50">
        <ul class="flex justify-around items-center h-16 max-w-lg mx-auto">
            <li><a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors"><i data-lucide="home" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-medium">หน้าแรก</span></a></li>
            <li><div class="relative -top-5"><button onclick="toggleActionMenu()" class="flex items-center justify-center w-14 h-14 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full text-white shadow-lg hover:scale-105 transition-transform"><i data-lucide="plus" class="w-7 h-7"></i></button></div></li>
            <li><a href="settings.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors w-full"><i data-lucide="user" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-medium">โปรไฟล์</span></a></li>
        </ul>
    </nav>
    <div id="action-menu-overlay" class="hidden fixed inset-0 bg-black/20 backdrop-blur-[2px] z-[60] flex items-end justify-center">
        <button onclick="toggleActionMenu()" class="absolute inset-0 w-full h-full cursor-default"></button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/clearances.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
