<!-- member/donations.html -->
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARSATU NEXT - ตรวจสอบและแจ้งยอดรับบริจาค</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-pink-50 to-indigo-50 text-gray-800 pb-20 min-h-screen">

    <header class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 shadow-sm flex items-center justify-between sticky top-0 z-50">
        <a href="dashboard.html" class="p-2 text-pink-500 hover:text-pink-700 hover:bg-pink-50 rounded-full transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <h1 class="text-lg font-bold text-gray-800">💝 แจ้งยอดเงินบริจาค</h1>
        <div class="w-9"></div>
    </header>

    <main class="p-5 max-w-lg mx-auto space-y-6">
        
        <!-- สถิติบริจาคสะสมประจำค่าย -->
        <div class="bg-white rounded-2xl shadow-sm border border-white p-6">
            <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-4">ยอดบริจาคสะสมจริง (ค่ายปัจจุบัน)</h3>
            <div class="text-3xl font-extrabold text-pink-600 mb-2" id="total-donations">0.00 ฿</div>
            
            <div class="w-full bg-gray-100 rounded-full h-3 mb-2 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-pink-500 to-rose-500 h-3 rounded-full transition-all" style="width: 0%"></div>
            </div>
            <p class="text-xs text-gray-500 text-right" id="progress-text">0% จากเป้าหมาย</p>
        </div>

        <!-- ฟอร์มส่งยอดเงินบริจาคเข้าค่าย -->
        <div class="bg-white rounded-2xl shadow-sm border border-white p-6">
            <form id="form-donation" class="space-y-4">
                <label class="block text-xs font-bold text-gray-700 mb-1">ช่องทางรับเงิน *</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="p-3 border rounded-xl text-center cursor-pointer hover:border-pink-500 transition-all relative">
                        <input type="radio" name="don-channel" value="โอนตรงเข้าบัญชี" class="sr-only peer" checked>
                        <div class="peer-checked:border-pink-500 peer-checked:bg-pink-50 absolute inset-0 rounded-xl border-2 border-transparent transition-all"></div>
                        <span class="relative z-10 text-xs font-bold text-gray-500 peer-checked:text-pink-600">โอนเข้าบัญชี</span>
                    </label>
                    <label class="p-3 border rounded-xl text-center cursor-pointer hover:border-pink-500 transition-all relative">
                        <input type="radio" name="don-channel" value="เงินสด" class="sr-only peer">
                        <div class="peer-checked:border-pink-500 peer-checked:bg-pink-50 absolute inset-0 rounded-xl border-2 border-transparent transition-all"></div>
                        <span class="relative z-10 text-xs font-bold text-gray-500 peer-checked:text-pink-600">เงินสด</span>
                    </label>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">วันที่รับเงิน *</label>
                    <input type="date" id="don-date" required class="w-full border rounded-xl p-3 text-sm bg-gray-50 focus:bg-white outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">ชื่อผู้บริจาค / คณะบุคคล / สถานที่ระดมทุน *</label>
                    <input type="text" id="don-details" required placeholder="เช่น นายสมชาย หลีเรืองแสง, ยอดกล่องรับบริจาคตลาด" class="w-full border rounded-xl p-3 text-sm bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">จำนวนเงินบริจาค (บาท) *</label>
                    <input type="number" id="don-amount" step="0.01" required placeholder="0.00" class="w-full border rounded-xl p-3 text-lg font-bold text-pink-600 bg-gray-50 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">หมายเหตุเสริม (ถ้ามี)</label>
                    <textarea id="don-remark" rows="2" class="w-full border rounded-xl p-3 text-sm bg-gray-50 outline-none" placeholder="ระบุเพิ่มเติม..."></textarea>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">แนบรูปภาพสลิปหลักฐานการรับเงิน *</label>
                    <input type="file" id="don-slip" required accept="image/*,application/pdf" class="w-full text-xs p-2 border rounded-xl bg-gray-50 cursor-pointer">
                </div>
                <button type="submit" class="w-full bg-pink-500 text-white font-bold py-3.5 rounded-xl shadow-md hover:bg-pink-600 transition-all">ส่งยอดเงินบริจาค</button>
            </form>
        </div>

        <div>
            <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-1">💝 ประวัติการแจ้งยอดบริจาคของคุณ</h3>
            <div id="my-donations-history" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 shadow-[0_-10px_40px_rgba(0,0,0,0.03)] z-50">
        <ul class="flex justify-around items-center h-16 max-w-lg mx-auto">
            <li><a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors"><i data-lucide="home" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-medium">หน้าแรก</span></a></li>
            <li>
                <div class="relative -top-5">
                    <button onclick="toggleActionMenu()" class="flex items-center justify-center w-14 h-14 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full text-white shadow-lg shadow-blue-500/30 hover:scale-105 transition-transform">
                        <i data-lucide="plus" class="w-7 h-7"></i>
                    </button>
                </div>
            </li>
            <li><a href="settings.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 transition-colors w-full"><i data-lucide="user" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-medium">โปรไฟล์</span></a></li>
        </ul>
    </nav>

    <div id="action-menu-overlay" class="hidden fixed inset-0 bg-black/20 backdrop-blur-[2px] z-[60] flex items-end justify-center">
        <div id="action-menu-sheet" class="bg-white w-full max-w-lg rounded-t-3xl p-6 pt-4 space-y-4 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-4"></div>
            <h3 class="font-bold text-center text-gray-800 mb-2">เลือกรายการที่ต้องการ</h3>
            
            <a href="clearances.html" class="flex items-center gap-4 p-4 bg-blue-50 rounded-2xl hover:bg-blue-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center"><i data-lucide="file-plus" class="w-5 h-5"></i></div>
                <span class="font-bold text-blue-900">ส่งคำขอเบิกเงิน</span>
            </a>
            <a href="history.html" class="flex items-center gap-4 p-4 bg-purple-50 rounded-2xl hover:bg-purple-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-purple-500 text-white flex items-center justify-center"><i data-lucide="clock" class="w-5 h-5"></i></div>
                <span class="font-bold text-purple-900">ดูประวัติคำขอเบิกเงิน</span>
            </a>
            <a href="donations.html" class="flex items-center gap-4 p-4 bg-pink-50 rounded-2xl hover:bg-pink-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-pink-500 text-white flex items-center justify-center"><i data-lucide="heart" class="w-5 h-5"></i></div>
                <span class="font-bold text-pink-900">จัดการ / แจ้งยอดเงินบริจาค</span>
            </a>
            
            <a href="../admin/dashboard.html" id="admin-action-link" class="hidden flex items-center gap-4 p-4 bg-emerald-50 rounded-2xl hover:bg-emerald-100 transition-colors">
                <div class="w-10 h-10 rounded-full bg-emerald-500 text-white flex items-center justify-center"><i data-lucide="shield-check" class="w-5 h-5"></i></div>
                <span class="font-bold text-emerald-900">ระบบจัดการหลังบ้าน (Admin)</span>
            </a>

            <button onclick="toggleActionMenu()" class="w-full text-gray-400 py-3 font-bold text-sm">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/donations.js"></script>
    <script>
        document.getElementById('don-date').value = new Date().toISOString().split('T')[0];
        lucide.createIcons();
    </script>
</body>
</html>
